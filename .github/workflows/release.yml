name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: H-toolkit
  WAILS_VERSION: v2.11.0

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            asset_suffix: windows-amd64
          - os: macos-latest
            label: macOS
            asset_suffix: macos-universal

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Windows app
        if: runner.os == 'Windows'
        shell: bash
        run: wails build -clean -platform windows/amd64

      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: wails build -clean -platform darwin/universal

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path "build\bin\${{ env.APP_NAME }}.exe"
          -DestinationPath "build\bin\${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip"
          -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          "build/bin/${APP_NAME}.app"
          "build/bin/${APP_NAME}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: build/bin/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
